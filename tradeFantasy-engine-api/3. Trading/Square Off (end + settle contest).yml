info:
  name: Square Off (end + settle contest)
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/user/contest/squareoff"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "contestId": "{{contestId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
