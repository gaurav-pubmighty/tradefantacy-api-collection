info:
  name: Place Pending Order (limit)
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/user/contest/pending"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "contestId": "{{contestId}}",
        "userRef": "{{userRef}}",
        "symbol": "BTC",
        "side": "buy",
        "qty": 0.01,
        "kind": "limit",
        "price": 50000
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
