info:
  name: Refill Wallet
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/user/contest/refill"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "contestId": "{{contestId}}",
        "ssvToken": "{{ssvToken}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: "const baseUrl = bru.getCollectionVar(\"baseUrl\");\r

        const token = bru.getCollectionVar(\"token\");\r

        \r

        await bru.sendRequest({\r

        \    url: `${baseUrl}/user/ssv/issue`, // change API path if different\r

        \    method: \"GET\",\r

        \    headers: {\r

        \        \"Content-Type\": \"application/json\",\r

        \        \"Authorization\": `Bearer ${token}`\r

        \    }\r

        }, async function(err, res) {\r

        \    if (err) {\r

        \        console.log(\"SSV token request error:\", err);\r

        \        return;\r

        \    }\r

        \r

        \    const j = res.data;\r

        \r

        \    if (j.success && j.data && j.data.ssvToken) {\r

        \        pm.collectionVariables.set(\"ssvToken\", j.data.ssvToken);\r

        \        console.log(\"ssvToken saved:\", j.data.ssvToken);\r

        \    } else {\r

        \        console.log(\"ssvToken not found:\", j);\r

        \    }\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
