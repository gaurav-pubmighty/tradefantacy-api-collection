info:
  name: Player History (journal)
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/user/contest/{{contestId}}/history?limit=50"
  params:
    - name: limit
      value: "50"
      type: query
    - name: type
      value: POSITION_OPENED,REFILL
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
