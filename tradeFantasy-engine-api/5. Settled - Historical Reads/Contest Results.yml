info:
  name: Contest Results
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/user/contest/{{contestId}}/results?all=true&limit=100&offset=0"
  params:
    - name: all
      value: "true"
      type: query
    - name: limit
      value: "100"
      type: query
    - name: offset
      value: "0"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
