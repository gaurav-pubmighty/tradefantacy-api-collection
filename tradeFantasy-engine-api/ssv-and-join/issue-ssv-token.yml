info:
  name: Issue SSV (captures ssvToken)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/user/ssv/issue"
  headers:
    - name: Content-Type
      value: application/json
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('200 OK', () => {
           expect(res.getStatus()).to.equal(200)}
        );

        const body = res.getBody();

        test('Returns ssvToken', () => {
          expect(body.data).to.have.property('ssvToken')}
        );

        if (body.data && body.data.ssvToken) {
          bru.setVar('ssvToken', body.data.ssvToken);
          console.log('Captured ssvToken:', body.data.ssvToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
