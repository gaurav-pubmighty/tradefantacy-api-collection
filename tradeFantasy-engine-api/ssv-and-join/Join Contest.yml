info:
  name: Join Contest
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/user/contest/join"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "contestId": "{{contestId}}",
        "ssvToken": "{{ssvToken}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        try {
          const baseUrl = bru.getCollectionVar("baseUrl");
          const token = bru.getGlobalEnvVar("user-token");
          
          console.log(baseUrl, token)

          if (!baseUrl) {
            throw new Error("baseUrl is missing");
          }

          if (!token) {
            throw new Error("token is missing");
          }

          const response = await bru.sendRequest({
            url: `${baseUrl}/user/ssv/issue`,
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${token}`
            }
          });

          console.log("SSV response:", response);

          const status = response?.status;
          const payload = response?.body ?? response?.data;

          if (status !== 200) {
            throw new Error(`SSV token request failed: ${status} ${response?.statusText || ""}`);
          }

          if (!payload?.success || !payload?.data?.ssvToken) {
            throw new Error(`ssvToken not found in response: ${JSON.stringify(payload)}`);
          }

          bru.setVar("ssvToken", payload.data.ssvToken);
          console.log("ssvToken saved:", payload.data.ssvToken);

        } catch (err) {
          console.error("Error while fetching ssvToken:", err);
          throw err;
        }
    - type: after-response
      code: "test('200 OK', () => expect(res.getStatus()).to.equal(200));\r

        test('Has wallet', () => {\r

        \  var d = res.getBody().data;\r

        \  expect(d).to.have.property('wallet');\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
