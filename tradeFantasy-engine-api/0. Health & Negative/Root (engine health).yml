info:
  name: Root (engine health)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: test('200 OK', () => expect(res.getStatus()).to.equal(200));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
