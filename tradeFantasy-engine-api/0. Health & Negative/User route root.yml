info:
  name: User route root
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/user/"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test('200 OK', () => expect(res.getStatus()).to.equal(200));\r

        test('Body text', () => expect(JSON.stringify(res.getBody())).to.include('User route is working'));"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
