info:
  name: Leaderboard
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/user/contest/{{contestId}}/leaderboard"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test('200 OK', () => expect(res.getStatus()).to.equal(200));\r

        test('Has leaderboard array', () => expect(res.getBody().data).to.have.property('leaderboard'));"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
