info:
  name: Instruments
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/user/instruments"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "test('200 OK', () => expect(res.getStatus()).to.equal(200));\r

        test('Returns BTC instrument', () => {\r

        \  var d = res.getBody().data;\r

        \  expect(d).to.have.property('BTC');\r

        });"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
