info:
  name: History (candles)
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/user/history?symbol=BTC&interval=1h&outputsize=1"
  params:
    - name: symbol
      value: BTC
      type: query
    - name: interval
      value: 1h
      type: query
    - name: outputsize
      value: "1"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
